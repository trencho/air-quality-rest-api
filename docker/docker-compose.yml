services:
  flask:
    build:
      args:
        BUILDKIT_PROGRESS: plain
      context: ..
      dockerfile: docker/Dockerfile
    container_name: flask
    depends_on:
      - mongo
      - redis
    deploy:
      replicas: 1
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-}
      DARK_SKY_TOKEN: ${DARK_SKY_TOKEN:-}
      ENABLED_COUNTRIES: ${ENABLED_COUNTRIES:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      MONGO_DATABASE: ${MONGO_DATABASE:-}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-}
      MONGO_USERNAME: ${MONGO_USERNAME:-}
      MONGODB_CONNECTION: ${MONGODB_CONNECTION:-}
      MONGODB_HOSTNAME: ${MONGODB_HOSTNAME:-}
      OPEN_WEATHER_TOKEN: ${OPEN_WEATHER_TOKEN:-}
      PYTHONPATH: ${PYTHONPATH:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REPO_NAME: ${REPO_NAME:-}
      TZ: ${TZ:-}
      VOLUME_PATH: ${VOLUME_PATH:-}
    image: aqra-flask:latest
    networks:
      - network
    ports:
      - "80:80"
    volumes:
      - flask-data:/var/api

  mongo:
    build:
      args:
        BUILDKIT_PROGRESS: plain
      context: ..
      dockerfile: docker/mongo/Dockerfile
    container_name: mongo
    deploy:
      replicas: 1
    env_file:
      - .env
    environment:
      MONDODB_LOG_DIR: ${MONDODB_LOG_DIR:-}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-}
      MONGODB_DATA_DIR: ${MONGODB_DATA_DIR:-}
    expose:
      - 27017
    image: aqra-mongo:latest
    networks:
      - network
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:8-alpine
    container_name: redis
    command: ["redis-server", "--save", "60", "1"]
    deploy:
      replicas: 1
    expose:
      - 6379
    networks:
      - network
    volumes:
      - redis-data:/data

networks:
  network:
    attachable: true
    driver: overlay

volumes:
  flask-data:
    driver: local
  mongo-data:
    driver: local
  redis-data:
    driver: local