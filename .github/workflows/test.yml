name: Test

on:
  pull_request:
  # Invoked by build-deploy.yml on master so the deploy is gated on green tests
  # (keeping the steps in one place instead of duplicating them).
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Check formatting (Black)
        run: black --check src tests definitions.py

      - name: Run tests
        run: pytest
