apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: redis
  name: redis
  namespace: aqra
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/aqra-network: "true"
        io.kompose.service: redis
    spec:
      automountServiceAccountToken: false
      containers:
        - name: redis
          image: redis:8-alpine
          imagePullPolicy: IfNotPresent
          # Used purely as a shared cache + rate-limit store, so persistence is off and
          # memory is bounded with LRU eviction (all keys carry TTLs).
          command:
            - redis-server
            - "--save"
            - ""
            - "--appendonly"
            - "no"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              memory: "320Mi"
          volumeMounts:
            - mountPath: /data
              name: redis-data
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
      volumes:
        # Ephemeral: it's a cache, so a cold start after a restart is acceptable and
        # avoids provisioning a persistent volume.
        - name: redis-data
          emptyDir: {}
