apiVersion: v1
kind: ConfigMap
metadata:
  name: flask-config
  namespace: aqra
data:
  APP_ENV: "production"
  MONGO_DATABASE: "air-quality"
  MONGODB_CONNECTION: "mongodb"
  MONGODB_HOSTNAME: "mongo:27017"
  PYTHONPATH: "/app/src"
  REDIS_URL: "redis://redis:6379/0"
  REPO_NAME: "air-quality-data-dump"
  TZ: "Europe/Skopje"
  VOLUME_PATH: "/var/api"